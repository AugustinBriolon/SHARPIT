name: Presentation Architecture Guard

on:
  pull_request:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install OS dependencies (sharp/prisma)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++ libvips-dev

      - name: Install (immutable)
        run: yarn install --immutable

      - name: Run tests
        run: yarn test
