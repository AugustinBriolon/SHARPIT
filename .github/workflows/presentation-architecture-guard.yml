name: Presentation Architecture Guard

on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install (immutable)
        run: yarn install --immutable

      - name: Run tests
        run: yarn test
