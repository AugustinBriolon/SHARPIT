gent to evaluate it against SHARPIT's product philosophy and evidence standards before any implementation work begins.\n</commentary>\n</example>\n\n<example>\nContext: The developer is naming domain model fields for a new training load entity.\nuser: "I'm modeling the training load entity. What fields should it have?"\nassistant: "Let me engage the sharpit-performance-scientist agent to define the correct domain model with scientifically accurate naming and justified inputs."\n<commentary>\nDomain modeling decisions in SHARPIT carry scientific meaning. Use the sharpit-performance-scientist agent to ensure naming, structure, and field semantics reflect established exercise science concepts.\n</commentary>\n</example>'''
